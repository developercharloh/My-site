        />
        <title>Build a trading bot without coding | Deriv Bot.</title>
        <style>
            :root { font-size: 62.5%; }

            /* ── Full-screen branded splash — visible from byte 0, before JS loads ── */
            #initial-shell {
                position: fixed;
                inset: 0;
                z-index: 99999;
                background: #050a0d;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                overflow: hidden;
                transition: opacity 0.55s ease;
            }
            #initial-shell.hidden {
                opacity: 0;
                pointer-events: none;
            }

            /* grid lines */
            #initial-shell::before {
                content: '';
                position: absolute;
                inset: 0;
                background-image:
                    linear-gradient(rgba(212,175,55,0.05) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(212,175,55,0.05) 1px, transparent 1px);
                background-size: 44px 44px;
                animation: shellGrid 24s linear infinite;
            }
            @keyframes shellGrid {
                from { background-position: 0 0; }
                to   { background-position: 44px 44px; }
            }

            /* gold glow */
            #initial-shell__glow {
                position: absolute;
                width: min(520px, 90vw);
                height: min(520px, 90vw);
                border-radius: 50%;
                background: radial-gradient(circle,
                    rgba(212,175,55,0.18) 0%,
                    rgba(34,85,34,0.10) 45%,
                    transparent 70%);
                animation: shellGlow 2.4s ease-in-out infinite alternate;
            }
            @keyframes shellGlow {
                from { transform: scale(0.92); opacity: 0.7; }
                to   { transform: scale(1.06); opacity: 1; }
            }

            /* logo */
            #initial-shell__logo {
                position: relative;
                display: block;
                width: min(320px, 78vw);
                height: min(320px, 78vw);
                object-fit: contain;
                border-radius: 28px;
                user-select: none;
                animation: shellLogoIn 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;
                filter: drop-shadow(0 0 40px rgba(212,175,55,0.45))
                        drop-shadow(0 0 80px rgba(34,85,34,0.30));
            }
            @keyframes shellLogoIn {
                from { opacity: 0; transform: scale(0.72); }
                to   { opacity: 1; transform: scale(1); }
            }

            /* progress bar */
            #initial-shell__bar {
                position: absolute;
                bottom: 0; left: 0; right: 0;
                height: 3px;
                background: rgba(212,175,55,0.12);
            }
            #initial-shell__bar::after {
                content: '';
                display: block;
                height: 100%;
                width: 0%;
                background: linear-gradient(90deg, #d4af37, #f0d060, #4ade80, #d4af37);
                background-size: 200% 100%;
                border-radius: 0 2px 2px 0;
                animation:
                    shellBarFill    7s linear 0.1s both,
                    shellBarShimmer  1.6s linear 0.1s infinite;
            }
            @keyframes shellBarFill {
                from { width: 0%; }
                to   { width: 100%; }
            }
            @keyframes shellBarShimmer {
                from { background-position: 200% 0; }
                to   { background-position: -200% 0; }
            }
        </style>
    </head>

    <body class="body theme theme--light">
        <div id="modal_root" class="modal-root"></div>
        <div id="popup_root" class="popup-root"></div>
        <div id="root"></div>
        <div id="initial-shell" aria-hidden="true">
            <div id="initial-shell__glow"></div>
            <img id="initial-shell__logo" src="/logo.png" alt="Trader CharlohFX" draggable="false" />
            <div id="initial-shell__bar"></div>
        </div>
        <script>
            // Hide the inline shell as soon as React renders anything into #root.
            (function () {
                var root = document.getElementById('root');
                var shell = document.getElementById('initial-shell');
                if (!root || !shell) return;
                var hide = function () { shell.classList.add('hidden'); };
                var observer = new MutationObserver(function () {
                    if (root.childNodes.length > 0) { hide(); observer.disconnect(); }
                });
                observer.observe(root, { childList: true });
                // Safety net: hide after 12s no matter what.
                setTimeout(function () { hide(); try { observer.disconnect(); } catch (e) {} }, 12000);
            })();
        </script>

        <!-- Browser Service Worker Prevention -->
        <script>
            // Check browser compatibility and prevent service worker issues
            const userAgent = navigator.userAgent.toLowerCase();
            const isFirefox = userAgent.includes('firefox');
            const isSafari = userAgent.includes('safari') && !userAgent.includes('chrome');
            const shouldSkipSW = isFirefox || isSafari;

            if (shouldSkipSW) {
                const browserName = isFirefox ? 'Firefox' : 'Safari';
                console.log(
                    `[HTML] ${browserName} detected - preventing service worker registration to avoid chunk loading issues`
                );

                // Cleanup any existing service workers
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker
                        .getRegistrations()
                        .then(registrations => {
                            registrations.forEach(registration => {
                                console.log(`[HTML] Unregistering existing SW for ${browserName}:`, registration.scope);
                                registration.unregister();
                            });
                        })
                        .catch(error => {
                            console.error('[HTML] Failed to cleanup service workers:', error);
                        });
                }
            }

            // Check online/offline status
            console.log('[HTML] Online status:', navigator.onLine);
            window.addEventListener('online', () => {
                console.log('[HTML] Back online');
            });
            window.addEventListener('offline', () => {
                console.log('[HTML] Gone offline');
            });

            // Listen for service worker messages if registered by PWA utils (non-problematic browsers only)
            if ('serviceWorker' in navigator && !shouldSkipSW) {
                navigator.serviceWorker.addEventListener('message', event => {
                    console.log('[HTML] Message from service worker:', event.data);
                });
            }
        </script>
    </body>
</html>
