        <meta charset="UTF-8" />

        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

        <!-- Preconnect to Deriv WebSocket + auth/CDN hosts so the TCP/TLS
             handshake starts in parallel with JS download. Cuts first-trade
             latency by 200-400ms on cold loads. -->
        <link rel="preconnect" href="https://ws.derivws.com" crossorigin />
        <link rel="preconnect" href="https://api.deriv.com" crossorigin />
        <link rel="preconnect" href="https://oauth.deriv.com" crossorigin />
        <link rel="dns-prefetch" href="https://ws.derivws.com" />
        <link rel="dns-prefetch" href="https://s.tradingview.com" />

        <!-- PWA Manifest -->
        <link rel="manifest" href="/manifest.json" />

        <!-- PWA Meta Tags -->
        <meta name="theme-color" content="#ff444f" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="default" />
        <meta name="apple-mobile-web-app-title" content="Deriv Bot" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="msapplication-TileColor" content="#ff444f" />
        <meta name="msapplication-tap-highlight" content="no" />

        <!-- Apple Touch Icons -->
        <link rel="apple-touch-icon" href="/logo.png" />
        <link rel="apple-touch-icon" sizes="152x152" href="/logo.png" />
        <link rel="apple-touch-icon" sizes="180x180" href="/logo.png" />
        <meta name="title" content="Build a trading bot without coding | Deriv Bot." />
        <meta
            name="description"
            content="Import your current bot or learn how to create a trading bot from scratch with our detailed guides, FAQs, and tutorials. Start with a quick strategy!"
        />
        <meta property="og:title" content="Deriv Bot" />
        <meta
            property="og:description"
            content="Import your current bot or learn how to create a trading bot from scratch with our detailed guides, FAQs, and tutorials. Start with a quick strategy!"
        />
        <title>Build a trading bot without coding | Deriv Bot.</title>
        <style>
            :root {
                font-size: 62.5%;
            }
            /* Initial paint skeleton — shown before React/JS finishes loading.
               Removed automatically once #root has children. */
            #initial-shell {
                position: fixed;
                inset: 0;
                background: #ffffff;
                display: flex;
                flex-direction: column;
                z-index: 1;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            }
            #initial-shell__topbar {
                height: 48px;
                background: #f2f3f4;
                border-bottom: 1px solid #e6e9e9;
                display: flex;
                align-items: center;
                padding: 0 16px;
                gap: 12px;
            }
            #initial-shell__brand {
                width: 28px;
                height: 28px;
                border-radius: 6px;
                background: #ff444f;
            }
            #initial-shell__brand-text {
                font-weight: 700;
                color: #333;
                font-size: 14px;
                letter-spacing: 0.3px;
            }
            #initial-shell__center {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 18px;
            }
            #initial-shell__dots {
                display: inline-flex;
                gap: 4px;
            }
            #initial-shell__dots span {
                width: 8px;
                height: 22px;
                border-radius: 2px;
                background: #85acb0;
                animation: shellPulse 1s ease-in-out infinite;
            }
            #initial-shell__dots span:nth-child(2) { animation-delay: 0.1s; }
            #initial-shell__dots span:nth-child(3) { animation-delay: 0.2s; }
            #initial-shell__dots span:nth-child(4) { animation-delay: 0.3s; }
            #initial-shell__dots span:nth-child(5) { animation-delay: 0.4s; }
            @keyframes shellPulse {
                0%, 100% { opacity: 0.35; transform: scaleY(0.7); }
                50%      { opacity: 1;    transform: scaleY(1); }
            }
            #initial-shell__label {
                color: #555;
                font-size: 13px;
            }
            #initial-shell.hidden { display: none; }
        </style>
    </head>

    <body class="body theme theme--light">
        <div id="modal_root" class="modal-root"></div>
        <div id="popup_root" class="popup-root"></div>
        <div id="root"></div>
        <div id="initial-shell" aria-hidden="true">
            <div id="initial-shell__topbar">
                <div id="initial-shell__brand"></div>
                <div id="initial-shell__brand-text">Deriv Bot</div>
            </div>
            <div id="initial-shell__center">
                <div id="initial-shell__dots">
                    <span></span><span></span><span></span><span></span><span></span>
                </div>
                <div id="initial-shell__label">Loading your trading workspace…</div>
            </div>
        </div>
        <script>
            // Hide the inline shell as soon as React renders anything into #root.
            (function () {
                var root = document.getElementById('root');
                var shell = document.getElementById('initial-shell');
                if (!root || !shell) return;
                var hide = function () { shell.classList.add('hidden'); };
                var observer = new MutationObserver(function () {
                    if (root.childNodes.length > 0) { hide(); observer.disconnect(); }
                });
                observer.observe(root, { childList: true });
                // Safety net: hide after 12s no matter what.
                setTimeout(function () { hide(); try { observer.disconnect(); } catch (e) {} }, 12000);
            })();
        </script>

        <!-- Browser Service Worker Prevention -->
        <script>
            // Check browser compatibility and prevent service worker issues
            const userAgent = navigator.userAgent.toLowerCase();
            const isFirefox = userAgent.includes('firefox');
            const isSafari = userAgent.includes('safari') && !userAgent.includes('chrome');
            const shouldSkipSW = isFirefox || isSafari;

            if (shouldSkipSW) {
                const browserName = isFirefox ? 'Firefox' : 'Safari';
                console.log(
                    `[HTML] ${browserName} detected - preventing service worker registration to avoid chunk loading issues`
                );

                // Cleanup any existing service workers
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker
                        .getRegistrations()
                        .then(registrations => {
                            registrations.forEach(registration => {
                                console.log(`[HTML] Unregistering existing SW for ${browserName}:`, registration.scope);
                                registration.unregister();
                            });
                        })
                        .catch(error => {
                            console.error('[HTML] Failed to cleanup service workers:', error);
                        });
                }
            }

            // Check online/offline status
            console.log('[HTML] Online status:', navigator.onLine);
            window.addEventListener('online', () => {
                console.log('[HTML] Back online');
            });
            window.addEventListener('offline', () => {
                console.log('[HTML] Gone offline');
            });

            // Listen for service worker messages if registered by PWA utils (non-problematic browsers only)
            if ('serviceWorker' in navigator && !shouldSkipSW) {
                navigator.serviceWorker.addEventListener('message', event => {
                    console.log('[HTML] Message from service worker:', event.data);
                });
            }
        </script>
    </body>
</html>
