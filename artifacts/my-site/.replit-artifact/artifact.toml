kind = "web"
previewPath = "/"
title = "My Site"
version = "1.0.0"
id = "artifacts/my-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19578

[services.development]
run = "pnpm --filter @workspace/my-site run dev"

[services.production]
build = [ "bash", "-c", "pnpm --filter @workspace/my-site run build && bash scripts/deploy-push.sh" ]
publicDir = "artifacts/my-site/dist"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19578"
